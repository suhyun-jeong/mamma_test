<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이유식 배죽 계산기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <h1>이유식 배죽 계산기</h1>

        <div class="stage-selection">
            <input type="radio" id="stage-10" name="stage" value="10">
            <label for="stage-10">10배죽</label>
            <input type="radio" id="stage-7" name="stage" value="7">
            <label for="stage-7">7배죽</label>
            <input type="radio" id="stage-5" name="stage" value="5" checked>
            <label for="stage-5">5배죽</label>
            <input type="radio" id="stage-3" name="stage" value="3">
            <label for="stage-3">3배죽</label>
            <input type="radio" id="stage-2" name="stage" value="2">
            <label for="stage-2">2배죽(진밥)</label>
        </div>

        <div class="stage-description">
            <p id="stage-age"></p>
            <p id="stage-info"></p>
        </div>

        <form id="calculator-form">
            <div class="amount-input">
                <label for="amount">만들고 싶은 양</label>
                <input type="number" id="amount" placeholder="숫자만 입력해주세요">
                <span>g</span>
                <button type="submit">계산</button>
            </div>
            <p class="input-guidance">최소 50g 이상, 최대 1200g까지 입력할 수 있어요</p>
        </form>

        <div class="legend">
            <div><span class="dot rice"></span>쌀</div>
            <div><span class="dot grains"></span>잡곡</div>
            <div><span class="dot meat"></span>고기</div>
            <div><span class="dot veg"></span>야채</div>
            <div><span class="dot water"></span>물</div>
        </div>

        <div class="ingredients-ratio">
            <div class="bar">
                <div id="rice-bar" class="bar-segment"></div>
                <div id="grains-bar" class="bar-segment"></div>
                <div id="meat-bar" class="bar-segment"></div>
                <div id="veg-bar" class="bar-segment"></div>
                <div id="water-bar" class="bar-segment"></div>
            </div>
        </div>

        <ul class="results">
        </ul>
    </div>

    <script src="main.js"></script>
</body>
</html>
